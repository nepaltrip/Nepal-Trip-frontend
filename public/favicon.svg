<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="100%" height="100%">
  <defs>
    <!-- Reusable Pine Tree Silhouette -->
    <g id="pine">
      <path d="M 25,0 L 10,25 L 18,25 L 5,50 L 15,50 L 0,80 L 20,80 L 20,100 L 30,100 L 30,80 L 50,80 L 35,50 L 45,50 L 32,25 L 40,25 Z" fill="#051A3B"/>
    </g>
  </defs>

  <!-- Background -->
  <rect width="800" height="800" fill="#FFFFFF"/>

  <!-- Orange Sun Arc -->
  <path d="M 240 330 A 180 180 0 1 1 560 330" fill="none" stroke="#FA6D16" stroke-width="26" stroke-linecap="butt"/>

  <!-- Blue Mountain Base -->
  <path d="M 120 460 L 220 310 L 260 350 L 310 270 L 380 190 L 460 280 L 510 240 L 610 390 L 660 480 Z" fill="#0059B3"/>

  <!-- White Snowcaps and Highlights -->
  <!-- Main Peak -->
  <path d="M 380 190 L 415 250 L 390 270 L 430 320 L 350 260 L 320 290 L 340 230 Z" fill="#FFFFFF"/>
  <path d="M 380 190 L 380 290 L 420 330 L 440 310 Z" fill="#FFFFFF" opacity="0.8"/>
  
  <!-- Left Peak -->
  <path d="M 220 310 L 255 355 L 230 375 L 265 410 L 205 345 L 185 370 L 200 320 Z" fill="#FFFFFF"/>
  <path d="M 220 310 L 220 390 L 250 420 L 270 390 Z" fill="#FFFFFF" opacity="0.8"/>
  
  <!-- Right Peak -->
  <path d="M 510 240 L 545 305 L 520 325 L 555 365 L 490 310 L 465 335 L 485 270 Z" fill="#FFFFFF"/>

  <!-- Foreground Dark Blue Base -->
  <path d="M 80 470 C 130 470, 180 540, 350 540 C 480 540, 580 500, 710 520 L 690 570 C 500 560, 300 580, 100 560 Z" fill="#051A3B"/>
  
  <!-- Light Blue River/Base Detail -->
  <path d="M 250 515 C 320 540, 420 540, 530 505 L 480 530 C 400 550, 300 545, 250 515 Z" fill="#0059B3"/>

  <!-- Foreground Pine Trees -->
  <!-- Left Side Trees -->
  <use href="#pine" transform="translate(130, 430) scale(0.65)"/>
  <use href="#pine" transform="translate(170, 465) scale(0.45)"/>
  
  <!-- Right Side Forest Clump -->
  <use href="#pine" transform="translate(470, 440) scale(0.7)"/>
  <use href="#pine" transform="translate(510, 365) scale(1.2)"/>
  <use href="#pine" transform="translate(565, 410) scale(0.85)"/>
  <use href="#pine" transform="translate(600, 385) scale(1.05)"/>
  <use href="#pine" transform="translate(645, 440) scale(0.65)"/>

  <!-- Airplane and Contrails -->
  <g transform="translate(570, 170) rotate(-28)">
    <!-- Orange Contrails -->
    <line x1="-160" y1="-10" x2="-10" y2="-10" stroke="#FA6D16" stroke-width="4"/>
    <line x1="-160" y1="10" x2="-10" y2="10" stroke="#FA6D16" stroke-width="4"/>
    
    <!-- Airplane Silhouette -->
    <!-- Fuselage -->
    <path d="M -22,-5 L 18,-5 C 24,-5 28,-2 28,0 C 28,2 24,5 18,5 L -22,5 Z" fill="#051A3B"/>
    <!-- Wings -->
    <polygon points="2,-5 12,-5 -8,-24 -16,-24" fill="#051A3B"/>
    <polygon points="2,5 12,5 -8,24 -16,24" fill="#051A3B"/>
    <!-- Tail -->
    <polygon points="-18,-5 -14,-5 -22,-14 -28,-14" fill="#051A3B"/>
    <polygon points="-18,5 -14,5 -22,14 -28,14" fill="#051A3B"/>
  </g>

  <!-- Typography -->
  <!-- Main Title -->
  <text x="400" y="660" font-family="'Montserrat', 'Arial Black', sans-serif" font-weight="900" font-size="76" fill="#051A3B" text-anchor="middle" letter-spacing="4">NEPAL TRIP</text>
  
  <!-- Tagline -->
  <text x="400" y="725" font-family="'Segoe UI', 'Helvetica Neue', sans-serif" font-weight="400" font-size="28" fill="#333333" text-anchor="middle" letter-spacing="1">Explore. Experience. Enjoy.</text>
  
  <!-- Tagline Horizontal Lines -->
  <line x1="120" y1="715" x2="220" y2="715" stroke="#333333" stroke-width="1.5"/>
  <line x1="580" y1="715" x2="680" y2="715" stroke="#333333" stroke-width="1.5"/>
</svg>
