<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- 1. PRIMARY SEO META TAGS -->
  <title>Nepal Trip | Best Nepal Tour Packages & Curated Itineraries</title>
  <meta name="title" content="Nepal Trip | Best Nepal Tour Packages & Curated Itineraries" />
  <meta name="description"
    content="Book top-rated Nepal tour packages with nepaltrip.in. Explore Kathmandu, Pokhara, and the Himalayas with our curated itineraries and unforgettable journeys." />
  <meta name="keywords"
    content="nepal trip, nepal tour, nepaltrip.in, nepal tour packages, visit nepal, kathmandu tour, himalaya travel" />
  <meta name="author" content="Nepal Trip" />

  <!-- 2. OPEN GRAPH / FACEBOOK / WHATSAPP TAGS (For link sharing) -->
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://nepaltrip.in/" />
  <meta property="og:title" content="Nepal Trip | Best Nepal Tour Packages" />
  <meta property="og:description"
    content="Book top-rated Nepal tour packages with nepaltrip.in. Explore Kathmandu, Pokhara, and the Himalayas." />
  <meta property="og:image" content="https://nepaltrip.in/default-share-image.jpg" />

  <!-- 3. PWA Essential Meta Tags -->
  <meta name="theme-color" content="#FDFBF7" />
  <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />

  <!-- ============================================
       PRECONNECTS
       Establishes early connections to critical
       third-party/API origins so the first real
       request to each doesn't pay the full DNS +
       TCP + TLS handshake cost.
       Lighthouse specifically flagged the backend
       preconnect as an est. 310ms LCP saving.
       Keep this list to your most critical origins
       only (max ~4) — too many preconnects can
       actually hurt by contending for bandwidth.
  ============================================ -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preconnect" href="https://nepal-trip-backend.onrender.com">
  <link rel="preconnect" href="https://images.unsplash.com" crossorigin>

  <!-- EXACT TYPOGRAPHY (PRECONNECTED & ASYNCHRONOUSLY LOADED TO PREVENT RENDER-BLOCKING) -->
  <!-- Preload the stylesheet for faster fetching -->
  <link rel="preload" as="style"
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;900&display=swap" />

  <!-- Load asynchronously using the 'print' media type trick -->
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;900&display=swap"
    media="print" onload="this.media='all'" />

  <!-- Fallback for browsers with JavaScript disabled -->
  <noscript>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;900&display=swap" />
  </noscript>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>

</html>
